<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Editor Voxel — MiniTown</title>
<style>
  :root {
    --panel-bg: rgba(28, 26, 38, 0.86);
    --panel-fg: #f4eee6;
    --accent: #ffbf6b;
    --btn-bg: rgba(255, 255, 255, 0.10);
    --btn-bg-active: #ffbf6b;
    --btn-fg-active: #2a2233;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden; background: #0d0b14; }
  #app { position: fixed; inset: 0; }
  canvas { display: block; }

  #panelUI {
    position: fixed; top: 12px; left: 12px; z-index: 10;
    font-family: "Segoe UI", system-ui, sans-serif; color: var(--panel-fg);
    background: var(--panel-bg); border-radius: 14px; padding: 12px 14px;
    backdrop-filter: blur(6px); box-shadow: 0 8px 28px rgba(0,0,0,0.35);
    width: 300px; user-select: none;
  }
  #panelUI h1 { margin: 0 0 2px; font-size: 17px; letter-spacing: 0.4px; }
  #panelUI .sub { margin: 0 0 10px; font-size: 11.5px; opacity: 0.7; }
  #panelUI h2 {
    margin: 12px 0 6px; font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.5px; color: var(--accent);
  }

  #palette { display: flex; flex-wrap: wrap; gap: 6px; max-height: 168px; overflow-y: auto; }
  #palette button {
    display: flex; align-items: center; gap: 6px;
    font: inherit; font-size: 11px; cursor: pointer; color: var(--panel-fg);
    background: var(--btn-bg); border: 1px solid rgba(255,255,255,0.14);
    border-radius: 8px; padding: 4px 7px 4px 5px; transition: background .15s, border-color .15s;
  }
  #palette button:hover { background: rgba(255,255,255,0.2); }
  #palette button.active { border-color: var(--accent); background: rgba(255,191,107,0.18); font-weight: 600; }
  #palette .swatch { width: 14px; height: 14px; border-radius: 3px; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.35); }

  .row { display: flex; gap: 6px; align-items: center; margin-top: 6px; }
  select, input[type="text"], textarea {
    font: inherit; font-size: 12px; color: var(--panel-fg);
    background: var(--btn-bg); border: 1px solid rgba(255,255,255,0.14);
    border-radius: 8px; padding: 6px 8px; width: 100%;
  }
  textarea { resize: vertical; min-height: 84px; font-family: "Consolas", ui-monospace, monospace; font-size: 11px; }
  button.act {
    font: inherit; font-size: 12px; cursor: pointer; color: var(--panel-fg);
    background: var(--btn-bg); border: 1px solid rgba(255,255,255,0.14);
    border-radius: 9px; padding: 7px 10px; transition: background .15s; white-space: nowrap;
  }
  button.act:hover { background: rgba(255,255,255,0.2); }
  button.act.primary { background: var(--btn-bg-active); color: var(--btn-fg-active); border-color: transparent; font-weight: 600; }

  #status { margin-top: 8px; font-size: 11.5px; min-height: 16px; color: var(--accent); line-height: 1.4; }

  #hud {
    position: fixed; bottom: 12px; left: 12px; z-index: 5;
    font-family: "Segoe UI", system-ui, sans-serif; color: var(--panel-fg);
    background: var(--panel-bg); border-radius: 12px; padding: 8px 12px;
    backdrop-filter: blur(6px); box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    font-size: 12px; user-select: none; opacity: 0.82; pointer-events: none;
  }
  #hud strong { color: var(--panel-fg); }
</style>
</head>
<body>
<div id="app"></div>

<div id="panelUI">
  <h1>Editor Voxel</h1>
  <p class="sub">Modela un prefab con los materiales de MiniTown</p>

  <h2>Material</h2>
  <div id="palette"></div>

  <h2>Importar prefab</h2>
  <select id="importSelect"></select>

  <h2>Exportar</h2>
  <div class="row">
    <input type="text" id="nameInput" placeholder="nombre_snake_case" autocomplete="off">
  </div>
  <div class="row">
    <button id="exportBtn" class="act primary" type="button">Exportar YAML</button>
    <button id="clearBtn" class="act" type="button">Limpiar</button>
  </div>
  <div class="row">
    <textarea id="yamlOut" readonly placeholder="Las lineas YAML para GAME.md apareceran aqui"></textarea>
  </div>
  <div id="status"></div>
</div>

<div id="hud">
  <strong>Clic izq</strong> coloca · <strong>Shift+clic</strong> borra · <strong>Clic der</strong> orbita · <strong>Rueda</strong> zoom
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<!-- window.GAME (datos del juego): script clasico, corre antes del modulo -->
<script src="./game-data.generated.js"></script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import {
  fromPrefab, setCell, removeCell, bounds,
  toPrefab, validateModel, validName, prefabLine, structureLine,
} from './src/editor-core.mjs';

const GAME = window.GAME;
const GRID = 16;               // celdas por lado de la grilla base
const VOX = 1;                 // una celda de grilla = un voxel

// UI (todo por getElementById; el oraculo exige consistencia id<->getElementById)
const appEl = document.getElementById('app');
const paletteEl = document.getElementById('palette');
const importSelect = document.getElementById('importSelect');
const nameInput = document.getElementById('nameInput');
const exportBtn = document.getElementById('exportBtn');
const yamlOut = document.getElementById('yamlOut');
const clearBtn = document.getElementById('clearBtn');
const statusEl = document.getElementById('status');

// --- Estado del modelo: SIEMPRE el mapa de celdas de editor-core (la escena es proyeccion). ---
let cells = {};
let currentMaterial = Object.keys(GAME.MATERIALS)[0] || null;
let isShiftDown = false;

// --- Escena Three.js ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d0b14);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(GRID * 0.9, GRID * 1.0, GRID * 1.4);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
appEl.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 2, 0);
// Clic izq libre para editar; clic der orbita; rueda hace zoom (por defecto).
controls.mouseButtons = { LEFT: null, MIDDLE: THREE.MOUSE.DOLLY, RIGHT: THREE.MOUSE.ROTATE };
controls.update();

scene.add(new THREE.AmbientLight(0x808080, 2.2));
const dir = new THREE.DirectionalLight(0xffffff, 2.4);
dir.position.set(1, 1.4, 0.8);
scene.add(dir);

const gridHelper = new THREE.GridHelper(GRID, GRID, 0x555070, 0x35304a);
scene.add(gridHelper);

// Plano invisible para raycasting inicial (colocar la primera capa).
const planeGeo = new THREE.PlaneGeometry(GRID, GRID);
planeGeo.rotateX(-Math.PI / 2);
const plane = new THREE.Mesh(planeGeo, new THREE.MeshBasicMaterial({ visible: false }));
scene.add(plane);

// Cursor fantasma (rollover): oculto salvo cuando apunta a la grilla.
const cubeGeo = new THREE.BoxGeometry(VOX, VOX, VOX);
const rollOver = new THREE.Mesh(cubeGeo, new THREE.MeshBasicMaterial({ color: 0xffbf6b, opacity: 0.4, transparent: true }));
rollOver.visible = false;
scene.add(rollOver);

const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();

// Grupo de voxeles = proyeccion del mapa de celdas.
const voxelGroup = new THREE.Group();
scene.add(voxelGroup);
const materialCache = {};

function threeMaterial(name) {
  if (!materialCache[name]) {
    const c = (GAME.MATERIALS[name] && GAME.MATERIALS[name].color) || [200, 200, 200];
    materialCache[name] = new THREE.MeshLambertMaterial({ color: new THREE.Color(c[0] / 255, c[1] / 255, c[2] / 255) });
  }
  return materialCache[name];
}

// Reconstruye la escena desde el mapa de celdas (source of truth).
function rebuild() {
  // cubeGeo y los materiales son compartidos/cacheados: no hay recursos por-mesh que liberar aqui.
  voxelGroup.clear();
  for (const k of Object.keys(cells)) {
    const [x, y, z] = k.split(',').map(Number);
    const mesh = new THREE.Mesh(cubeGeo, threeMaterial(cells[k]));
    mesh.position.set(x + 0.5, y + 0.5, z + 0.5);
    mesh.userData.cell = [x, y, z];
    voxelGroup.add(mesh);
  }
  updateStatus();
}

function targets() {
  return [plane, ...voxelGroup.children];
}

function setPointer(event) {
  const r = renderer.domElement.getBoundingClientRect();
  pointer.set(((event.clientX - r.left) / r.width) * 2 - 1, -((event.clientY - r.top) / r.height) * 2 + 1);
  raycaster.setFromCamera(pointer, camera);
}

// Celda vacia adyacente a la cara intersectada (para colocar).
function placeCell(intersect) {
  const p = intersect.point.clone().add(intersect.face.normal.clone().multiplyScalar(VOX * 0.5));
  return [Math.floor(p.x), Math.floor(p.y), Math.floor(p.z)];
}

function onPointerMove(event) {
  setPointer(event);
  const hits = raycaster.intersectObjects(targets(), false);
  if (hits.length === 0) { rollOver.visible = false; return; }
  const [cx, cy, cz] = placeCell(hits[0]);
  rollOver.position.set(cx + 0.5, cy + 0.5, cz + 0.5);
  rollOver.visible = true;
}

function onPointerDown(event) {
  // Guard: solo el canvas edita; los clics sobre la UI no colocan voxeles.
  if (event.target !== renderer.domElement) return;
  if (event.button !== 0) return;
  setPointer(event);
  const hits = raycaster.intersectObjects(targets(), false);
  if (hits.length === 0) return;
  const hit = hits[0];
  if (isShiftDown) {
    if (hit.object.userData.cell) {
      const [x, y, z] = hit.object.userData.cell;
      cells = removeCell(cells, x, y, z);
      rebuild();
    }
    return;
  }
  const [cx, cy, cz] = placeCell(hit);
  cells = setCell(cells, cx, cy, cz, currentMaterial);
  rebuild();
}

// --- Paleta: un boton por material de GAME.MATERIALS ---
function buildPalette() {
  for (const name of Object.keys(GAME.MATERIALS)) {
    const c = GAME.MATERIALS[name].color;
    const btn = document.createElement('button');
    btn.type = 'button';
    const sw = document.createElement('span');
    sw.className = 'swatch';
    sw.style.background = 'rgb(' + c[0] + ',' + c[1] + ',' + c[2] + ')';
    const label = document.createElement('span');
    label.textContent = name;
    btn.appendChild(sw);
    btn.appendChild(label);
    if (name === currentMaterial) btn.classList.add('active');
    btn.addEventListener('click', () => {
      currentMaterial = name;
      for (const b of paletteEl.children) b.classList.remove('active');
      btn.classList.add('active');
    });
    paletteEl.appendChild(btn);
  }
}

// --- Import: opciones desde GAME.PREFABS (vacia + una por prefab) ---
function buildImport() {
  const empty = document.createElement('option');
  empty.value = '';
  empty.textContent = '— elegir prefab —';
  importSelect.appendChild(empty);
  for (const name of Object.keys(GAME.PREFABS || {})) {
    const opt = document.createElement('option');
    opt.value = name;
    opt.textContent = name;
    importSelect.appendChild(opt);
  }
  importSelect.addEventListener('change', () => {
    const name = importSelect.value;
    if (!name) return;
    const prefab = GAME.PREFABS[name];
    if (!prefab) { statusEl.textContent = 'Prefab no encontrado: ' + name; return; }
    cells = fromPrefab(prefab);
    rebuild();
    statusEl.textContent = 'Importado: ' + name;
  });
}

function updateStatus() {
  const n = Object.keys(cells).length;
  const b = bounds(cells);
  if (!b) { statusEl.textContent = 'Escena vacia — clic izquierdo para colocar.'; return; }
  const size = [b.max[0] - b.min[0] + 1, b.max[1] - b.min[1] + 1, b.max[2] - b.min[2] + 1];
  statusEl.textContent = n + ' voxeles · tamano ' + size.join('x');
}

// --- Export: validName + validateModel; si falla, #status y no tocar #yamlOut ---
function onExport() {
  const name = nameInput.value.trim();
  if (!validName(name)) {
    statusEl.textContent = 'Nombre invalido: usa snake_case en minuscula que empiece con letra.';
    return;
  }
  const prefab = toPrefab(cells);
  const findings = validateModel(prefab, GAME.MATERIALS);
  if (findings.length > 0) {
    statusEl.textContent = 'No se puede exportar: ' + findings.join('; ');
    return;
  }
  yamlOut.value =
    '# pegar bajo prefabs:\n' + prefabLine(name, prefab) +
    '\n# pegar bajo structures:\n' + structureLine(name);
  statusEl.textContent = 'Exportado "' + name + '" — copia las lineas a GAME.md.';
}

function onClear() {
  cells = {};
  rebuild();
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

// Wiring
renderer.domElement.addEventListener('pointermove', onPointerMove);
renderer.domElement.addEventListener('pointerdown', onPointerDown);
renderer.domElement.addEventListener('pointerleave', () => { rollOver.visible = false; });
window.addEventListener('keydown', (e) => { if (e.key === 'Shift') isShiftDown = true; });
window.addEventListener('keyup', (e) => { if (e.key === 'Shift') isShiftDown = false; });
window.addEventListener('resize', onResize);
exportBtn.addEventListener('click', onExport);
clearBtn.addEventListener('click', onClear);

buildPalette();
buildImport();
rebuild();
animate();
</script>
</body>
</html>
