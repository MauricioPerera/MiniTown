<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MiniTown</title>
<style>
  :root {
    --panel-bg: rgba(28, 26, 38, 0.86);
    --panel-fg: #f4eee6;
    --accent: #ffbf6b;
    --btn-bg: rgba(255, 255, 255, 0.10);
    --btn-bg-active: #ffbf6b;
    --btn-fg-active: #2a2233;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden; background: #0d0b14; }
  #app { position: fixed; inset: 0; }
  canvas { display: block; }

  #panelUI {
    position: fixed; top: 12px; left: 12px; z-index: 10;
    font-family: "Segoe UI", system-ui, sans-serif; color: var(--panel-fg);
    background: var(--panel-bg); border-radius: 14px; padding: 12px 14px;
    backdrop-filter: blur(6px); box-shadow: 0 8px 28px rgba(0,0,0,0.35);
    max-width: 280px; user-select: none;
  }
  #panelUI h1 { margin: 0 0 2px; font-size: 17px; letter-spacing: 0.4px; }
  #panelUI .sub { margin: 0 0 10px; font-size: 11.5px; opacity: 0.7; }
  #modes { display: flex; flex-wrap: wrap; gap: 6px; }
  #modes button {
    font: inherit; font-size: 12px; cursor: pointer; color: var(--panel-fg);
    background: var(--btn-bg); border: 1px solid rgba(255,255,255,0.14);
    border-radius: 9px; padding: 6px 10px; transition: background .15s, color .15s;
  }
  #modes button:hover { background: rgba(255,255,255,0.2); }
  #modes button.active { background: var(--btn-bg-active); color: var(--btn-fg-active); border-color: transparent; font-weight: 600; }
  #actions { margin-top: 10px; }
  #actions button {
    font: inherit; font-size: 12px; cursor: pointer; color: var(--panel-fg);
    background: var(--btn-bg); border: 1px solid rgba(255,255,255,0.14);
    border-radius: 9px; padding: 6px 10px; transition: background .15s;
  }
  #actions button:hover { background: rgba(255,255,255,0.2); }

  #hud {
    position: fixed; bottom: 12px; left: 12px; z-index: 10;
    font-family: "Segoe UI", system-ui, sans-serif; color: var(--panel-fg);
    background: var(--panel-bg); border-radius: 12px; padding: 8px 12px;
    backdrop-filter: blur(6px); box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    display: flex; gap: 14px; align-items: baseline; font-size: 12px; user-select: none;
  }
  #hud .hud-clock { color: var(--accent); font-weight: 700; font-variant-numeric: tabular-nums; font-size: 15px; }
  #hud .hud-money { color: #9be29b; font-weight: 700; font-variant-numeric: tabular-nums; }
  #hud .hud-weather { color: #bcd6ff; font-weight: 600; }
  #hud .hud-pop { color: #e6d6ff; font-weight: 600; }
  #hud .hud-att { color: #ffd9a8; font-weight: 600; font-variant-numeric: tabular-nums; }
  #hud .hud-keys { opacity: 0.55; }

  /* Panel de politica (plegable desde la toolbar): mismo lenguaje visual del HUD. */
  #policyPanel {
    position: fixed; top: 12px; left: 304px; z-index: 10;
    font-family: "Segoe UI", system-ui, sans-serif; color: var(--panel-fg);
    background: var(--panel-bg); border-radius: 14px; padding: 12px 14px;
    backdrop-filter: blur(6px); box-shadow: 0 8px 28px rgba(0,0,0,0.35);
    width: 232px; user-select: none; font-size: 12px;
  }
  #policyPanel[hidden] { display: none; }
  #policyPanel h2 { margin: 0 0 8px; font-size: 13px; letter-spacing: 0.4px; color: var(--accent); }
  #policyPanel .pol-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  #policyPanel .pol-row label { flex: 0 0 68px; opacity: 0.85; }
  #policyPanel #polTaxSlider { flex: 1 1 auto; accent-color: var(--accent); }
  #policyPanel #polTaxVal { flex: 0 0 30px; text-align: right; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--accent); }
  #policyPanel .pol-bar { flex: 1 1 auto; height: 10px; border-radius: 6px; background: rgba(255,255,255,0.12); overflow: hidden; }
  #policyPanel #polAttFill { height: 100%; width: 0%; border-radius: 6px; transition: width .3s, background .3s; }
  #policyPanel #polAttVal { flex: 0 0 34px; text-align: right; font-weight: 700; font-variant-numeric: tabular-nums; }
  #policyPanel .pol-status { border-top: 1px solid rgba(255,255,255,0.12); padding-top: 8px; line-height: 1.6; opacity: 0.92; }
  #policyPanel .pol-status div { font-variant-numeric: tabular-nums; }

  #notice {
    position: fixed; top: 12px; left: 50%; transform: translateX(-50%); z-index: 12;
    display: none; pointer-events: none;
    font-family: "Segoe UI", system-ui, sans-serif; color: var(--panel-fg);
    background: rgba(150, 40, 48, 0.92); border-radius: 10px; padding: 8px 16px;
    backdrop-filter: blur(6px); box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    font-size: 13px; font-weight: 600; letter-spacing: 0.3px;
  }

  #inspect {
    position: fixed; z-index: 11; display: none; pointer-events: none;
    font-family: "Segoe UI", system-ui, sans-serif; color: var(--panel-fg);
    background: var(--panel-bg); border-radius: 12px; padding: 10px 12px;
    backdrop-filter: blur(6px); box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    max-width: 220px; font-size: 12px; line-height: 1.35;
  }
  #inspect .ins-h { font-size: 14px; font-weight: 700; }
  #inspect .ins-sub { opacity: 0.7; margin-bottom: 6px; }
  #inspect .ins-title { color: var(--accent); font-size: 11px; text-transform: uppercase; letter-spacing: 0.4px; margin-top: 4px; }
  #inspect .ins-vac { opacity: 0.6; font-style: italic; }
  #inspect ul.ins-list { margin: 4px 0 0; padding-left: 16px; }
  #inspect ul.ins-list li { margin: 1px 0; }
</style>
</head>
<body>
<div id="app"></div>

<div id="panelUI">
  <h1>MiniTown</h1>
  <p class="sub">Arrastra en modo zona para colocar bloques</p>
  <div id="modes">
    <button data-mode="explore" class="active">Explorar (E)</button>
    <button data-mode="residential">Casa (1)</button>
    <button data-mode="shop">Tienda (2)</button>
    <button data-mode="workspace">Taller (3)</button>
    <button data-mode="farm">Granja (4)</button>
    <button data-mode="warehouse">Almacen (5)</button>
    <button data-mode="market">Mercado (6)</button>
  </div>
  <div id="actions">
    <button id="policyBtn" type="button" title="Panel de gestion (impuestos / atractividad)" aria-expanded="false" aria-controls="policyPanel">⚖ Gestion</button>
    <button id="soundBtn" type="button" title="Sonido ambiente (on/off)">🔊 Sonido</button>
    <button id="newGame" type="button">Nueva partida</button>
  </div>
</div>

<div id="policyPanel" hidden>
  <h2>Gestion</h2>
  <div class="pol-row pol-tax">
    <label id="polTaxLabel" for="polTaxSlider">Impuestos</label>
    <input type="range" id="polTaxSlider" min="0" max="10" step="0.5" value="3">
    <span id="polTaxVal">3.0</span>
  </div>
  <div class="pol-row pol-att">
    <label id="polAttLabel">Atractividad</label>
    <div class="pol-bar"><div id="polAttFill"></div></div>
    <span id="polAttVal">0%</span>
  </div>
  <div class="pol-status">
    <div id="polPop"></div>
    <div id="polRevenue"></div>
    <div id="polImmig"></div>
  </div>
</div>

<div id="hud"></div>
<div id="inspect"></div>
<div id="notice"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>

<!-- window.GAME (datos) y el adaptador voxel UMD: scripts clasicos, corren antes del modulo -->
<script src="./game-data.generated.js"></script>
<script src="./adapters/three-voxel.js"></script>

<script type="module">
import { start } from './src/render.mjs';
start({
  container: document.getElementById('app'),
  modebar: document.getElementById('modes'),
  hud: document.getElementById('hud'),
  panel: document.getElementById('inspect'),
  notice: document.getElementById('notice'),
  newGameBtn: document.getElementById('newGame'),
  soundBtn: document.getElementById('soundBtn'),
  policyBtn: document.getElementById('policyBtn'),
  policyPanel: document.getElementById('policyPanel'),
});
</script>
</body>
</html>
